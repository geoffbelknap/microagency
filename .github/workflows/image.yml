name: Image

# Build and publish the microagency workload OCI image with microagent (no
# Docker). Building never boots a VM — microagent assembles the rootfs from the
# base image plus the spec's baked files and extracts it on the host
# (mke2fs/debugfs) — so it runs on a stock runner. Pull requests build only, to
# validate the whole path; merges to main and version tags publish to GHCR.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image:
    runs-on: ubuntu-latest
    env:
      REPO_IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # microagent provides the Docker-free image build (create + commit). The
      # tap formula pulls in its Linux build deps (e2fsprogs for mke2fs/debugfs,
      # passt) automatically.
      - name: Install microagent
        run: |
          # Homebrew ships on the runner but is not on PATH by default.
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew install geoffbelknap/tap/microagent
          # Expose the brew bin (where microagent is linked) to later steps.
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          microagent version

      # `make image` runs the whole build (static binary + create + commit), so
      # pull requests exercise and validate the entire path. Merges to main and
      # version tags authenticate and commit-with-push to the destination tag.
      # One tag per event: committing the same rootfs to a second tag needs an
      # idempotent-blob commit (microagent >= the release that dedupes existing
      # OCI-layout blobs); add an immutable :sha tag here once that ships.
      - name: Build and publish image
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            make image IMAGE_REF="$REPO_IMAGE:ci-validate"
            exit 0
          fi
          echo "$GHCR_TOKEN" | microagent registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          ref="$REPO_IMAGE:latest"
          case "${{ github.ref }}" in
            refs/tags/*) ref="$REPO_IMAGE:${GITHUB_REF_NAME}" ;;
          esac
          make image PUSH=1 IMAGE_REF="$ref"
