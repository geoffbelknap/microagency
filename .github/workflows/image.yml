name: Image

# Build and publish the microagency workload OCI image with microagent (no
# Docker). Building never boots a VM — microagent assembles the rootfs from the
# base image plus the spec's baked files and extracts it on the host
# (mke2fs/debugfs) — so it runs on a stock runner. Pull requests build only, to
# validate the whole path; merges to main and version tags publish to GHCR.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image:
    runs-on: ubuntu-latest
    env:
      REPO_IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # microagent provides the Docker-free image build (create + commit), which
      # needs only the CLI plus e2fsprogs (mke2fs/debugfs, preinstalled on the
      # runner) — no VM boot. Install the CLI pinned to a commit that includes
      # the idempotent-blob commit fix, so one build can be tagged with several
      # refs (:sha and :latest). Move this pin to a release tag once microagent
      # cuts a stable release that carries the fix.
      - name: Install microagent
        run: |
          go install github.com/geoffbelknap/microagent/cmd/microagent@475e704df2f6
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          microagent version

      # `make image` runs the whole build (static binary + create + commit), so
      # pull requests exercise and validate the entire path. Merges to main and
      # version tags authenticate and commit-with-push to a moving tag (:latest
      # on main, :<tag> on version tags) plus an immutable :sha-<sha> tag, both
      # committed from the one build.
      - name: Build and publish image
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            make image IMAGE_REF="$REPO_IMAGE:ci-validate"
            exit 0
          fi
          echo "$GHCR_TOKEN" | microagent registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          ref="$REPO_IMAGE:latest"
          case "${{ github.ref }}" in
            refs/tags/*) ref="$REPO_IMAGE:${GITHUB_REF_NAME}" ;;
          esac
          make image PUSH=1 IMAGE_REF="$ref" EXTRA_REFS="$REPO_IMAGE:sha-${{ github.sha }}"
